<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVENTO+</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="topo.css">
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="logo">
            <a href="index.html"><i class="fa-solid fa-globe"></i> Meu Site</a>
        </div>

        <nav>
            <a href="ajuda.html"><i class="fa-solid fa-headphones"></i> Ajuda</a>
            <a href="sobre.html"><i class="fa-solid fa-info-circle"></i> Sobre</a>

            <div class="dropdown">
                <a href="#"><i class="fa-solid fa-bars"></i> Menu</a>
                <div class="dropdown-content">
                    <a href="cadastroCliente.html"><i class="fa-solid fa-user"></i> Cadastro Cliente</a>
                    <a href="eventos.html"><i class="fa-solid fa-gear"></i> Cadastro Tabela</a>
                    <a href="criar.html"><i class="fa-solid fa-right-from-bracket"></i> Cadastro
                        Usuario</a>
                </div>
            </div>
        </nav>
    </header>

    <div class="container">

        <form action="form-cadastro.html">
            <h1>CADASTRO DE EVENTOS</h1>

            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" required placeholder="Nome completo">

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="email@gmail.com">

            <label for="senha">Senha</label>
            <input type="password" name="senha" id="senha" required placeholder="Senha123">

            <label for="confirmarSenha">Confirmação da Senha</label>
            <input type="password" name="confirmarSenha" id="confirmarSenha" required placeholder="Senha123">

            <label for="eventos">Eventos</label>
            <select name="eventos" id="eventos">
                <option value="escolha" selected disabled>Escolha a Reunião!</option>
                <option value="auditorios">Auditorios</option>
                <option value="reuniao">Reuniao</option>
                <option value="apresentacao">Apresentacao</option>
                <option value="atividadeInstitucional">Atividades Institucionais</option>
                <option value="salas">Salas de Aula</option>
            </select>
            
            <div class="confirmacaoCheck">
                <input type="checkbox" name="confirmacao" id="confirmacao">
                <label for="confirmacao" id="labelConfirmacao">Eu aceito os termos e condições</label>
            </div>

            <button type="submit" class="cadastro" id="cadastro" onclick="validarSenha(event)">Cadastrar</button>
        </form>

    </div>

    <script src="script2.js"></script>
</body>

</html>
