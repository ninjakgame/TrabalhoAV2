<!DOCTYPE html>
<html lang="PT-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALA+</title>
    <link rel="shortcut icon" href="agendamento.png" type="image/x-icon">
    <link rel="stylesheet" href="cliente.css">
    <link rel="stylesheet" href="paginaInicial2.css">
    <link rel="stylesheet" href="topo3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>
    <header>
        <div class="topo">
            <div class="conteudoTopo">
                <h2 class="logo"><a href="paginaInicial.html">SALA+</a></h2>

                <div class="links">
                    <a href="sobre.html" class="login">SOBRE NOIS</a>
                    <a href="cadastroCliente.html" class="login">AGENDAR AGORA</a>
                    <a href="ajuda.html" class="login">AJUDA</a>
                </div>
            </div>
        </div>
    </header>

    <section>
        <h1>Cadastro do Cliente</h1>

        <form onsubmit="return validarForm()">

            <input type="text" id="nome" placeholder="Usuário">
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="senha" placeholder="Senha">

            <div class="barra-container">
                <div id="barraSenha"></div>
            </div>

            <div id="forcaSenha"></div>
            <div id="requisitosSenha"></div>

            <input type="text" id="cpf" placeholder="CPF">
            <input type="text" id="telefone" placeholder="Telefone">
            <input type="text" id="cep" placeholder="CEP">

            <div id="infoCep"></div>

            <button type="submit">Cadastrar</button>

        </form>
    </section>

    <footer>
        <div class="containerFooter">
            <div class="esquerdo">
                <h2 class="textoFooter">SALA+</h2>

                <div class="descricaoEsquerda">
                    <div class="eventoss">

                        <h2>Eventos</h2>
                        <a href="#">Agendamento</a>
                        <a href="#">Lista de Agendas</a>
                        <a href="#">Cadastro Clientes</a>
                    </div>

                    <div class="eventoss">
                        <h2>Planos</h2>
                        <a href="#">Pagamento</a>
                        <a href="#">Ver Planos</a>
                    </div>
                </div>
            </div>


            <div class="esquerda">
                <h2 class="textoFooter">APLICATIVOS</h2>

                <div class="descricaoEsquerda">
                    <div class="apps">
                        <div class="topos">
                            <a href="https://www.instagram.com/">
                                <img src="instagram.svg" alt="">
                            </a>

                            <a href="https://www.facebook.com/?locale=pt_BR">
                                <img src="facebook.svg" alt="">
                            </a>

                            <a href="https://web.whatsapp.com/">
                                <img src="whatsapp.svg" alt="">
                            </a>
                        </div>

                        <h4 id="arolba">@agendamento_sala+</h4>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <!-- MODAL -->
    <div id="modalEscolha" class="modal">
        <div class="modal-box">
            <h2>O que deseja fazer?</h2>
            <button onclick="acaoWhats()">Enviar via WhatsApp</button>
            <button onclick="acaoTabela()">Ver Tabela</button>
            <button class="fechar" onclick="fecharModal()">Cancelar</button>
        </div>
    </div>

    <script src="cliente.js"></script>
</body>

</html>
