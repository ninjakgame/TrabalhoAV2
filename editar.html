<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <title>Editar Conta</title>
    <link rel="stylesheet" href="criar.css">
    <link rel="stylesheet" href="topo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="logo">
            <a href="index.html"><i class="fa-solid fa-globe"></i> Meu Site</a>  
        </div>

        <nav>
            <a href="ajuda.html"><i class="fa-solid fa-headphones"></i> Ajuda</a>
            <a href="sobre.html"><i class="fa-solid fa-info-circle"></i> Sobre</a>

            <div class="dropdown">
                <a href="#"><i class="fa-solid fa-bars"></i> Menu</a>
                <div class="dropdown-content">
                    <a href="cadastroCliente.html"><i class="fa-solid fa-user"></i> Cadastro Cliente</a>
                    <a href="eventos.html"><i class="fa-solid fa-gear"></i> Cadastro Tabela</a>
                    <a href="criar.html"><i class="fa-solid fa-right-from-bracket"></i> Cadastro
                        Usuario</a>
                </div>
            </div>
        </nav>
    </header>

    <div class="cadastroConta">
        <div class="container">
            <h2>EDITAR CONTA</h2>

            <form action="form-cadastro.html" onsubmit="return validarSenha()">

                <label for="nome">Nome</label>
                <input type="text" name="nome" id="nome" required value="Pedro Gamer2025">

                <label for="email">Email</label>
                <input type="email" name="email" id="email" required value="Gamer@gmail.com">

                <label for="senha">Senha</label>
                <input type="password" name="senha" id="senha" required value="Pedro_2025">

                <label for="confirmarSenha">Confirmação da Senha</label>
                <input type="password" name="confirmarSenha" id="confirmarSenha" required value="Pedro_2025">

                <label for="agenda">Agenda</label>
                <select name="agenda" id="agenda" required>
                    <option value="escolha" disabled>Escolha seu Agendamento Aqui</option>
                    <option value="reuniao" selected>Reuniao</option>
                    <option value="aula">Aula</option>
                    <option value="evento">Evento</option>
                    <option value="outra">Outras Atividades</option>
                </select>

                <button type="submit">Salvar</button>

            </form>
        </div>
    </div>

    <footer class="footer">
    <div class="footer-content">
        <h3>EVENTO+</h3>
        <p>Organizando eventos com facilidade e rapidez.</p>

        <div class="footer-links">
            <a href="#">Início</a>
            <a href="eventos.html">Agendar Evento</a>
            <a href="ajuda.html">Contato</a>
            <a href="sobre.html">Sobre</a>
        </div>

        <p class="footer-copy">© 2025 EVENTO+ - Todos os direitos reservados.</p>
    </div>
</footer>

    <script src="criar.js"></script>
</body>

</html>
