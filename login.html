<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALA+</title>
    <link rel="shortcut icon" href="agendamento.png" type="image/x-icon">
    <link rel="stylesheet" href="login.css">
</head>

<body>

<div id="mensagem" class="mensagem"></div>

<div class="container">
    <div class="containerConteudo">
        <div class="imagem">
            <img src="image 11.jpg" id="imagemLogin">
        </div>

        <div class="conteudo">
            <form onsubmit="return validar()">
                <p>LOGIN</p>

                <input type="text" id="nome" required placeholder="Usuario">
                <input type="email" id="email" required placeholder="Email">
                <input type="password" id="senha" required placeholder="Senha">

                <div class="bot">
                    <button type="submit">Entrar</button>
                    <button type="button" onclick="cadastro()">Cadastrar-se</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="login.js"></script>
</body>
</html>
