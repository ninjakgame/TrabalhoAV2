<!DOCTYPE html>
<html lang="PT-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Do Cliente</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <div class="container">
       <form onsubmit="return validarSenha()">
    <input type="text" id="nome" required placeholder="Usuário">

    <input type="email" id="email" required placeholder="Email">

    <input type="password" id="senha" required placeholder="Senha">

    <input type="password" id="confirmarSenha" required placeholder="Confirmar senha">

    <button type="submit">Cadastrar</button>
</form>
    </div>

    <script src="login.js"></script>
</body>

</html>
