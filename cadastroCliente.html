<!DOCTYPE html>
<html lang="PT-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Do Cliente</title>
    <link rel="stylesheet" href="cliente.css">
    <link rel="stylesheet" href="paginaInicial2.css">
    <link rel="stylesheet" href="topo3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>
    <header>
        <div class="topo">
            <div class="conteudoTopo">
                <h2 class="logo"><a href="index.html">SALA+</a></h2>

                <div class="links">
                    <a href="sobre.html" class="login">SOBRE NOIS</a>
                    <a href="cadastroCliente.html" class="login">AGENDAR AGORA</a>
                    <a href="ajuda.html" class="login">AJUDA</a>
                </div>
            </div>
        </div>
    </header>

    <section>
        <h1>Cadastro do Cliente</h1>

        <form action="form-cadastro.html" onsubmit="return validarSenha()">
            <h2>Contato do Cliente</h2>

            <input type="text" name="nome" id="nome" required placeholder="Usuario">

            <input type="email" name="email" id="email" required placeholder="E-mail">

            <input type="password" name="senha" id="senha" required placeholder="Senha">

            <div class="number">

                <input type="text" name="cpf" id="cpf" maxlength="14" required placeholder="CPF">

                <input type="text" name="telefone" id="telefone" maxlength="15" required placeholder="Telefone">

            </div>

            <h2>Endereço Completo</h2>
            <input type="text" name="rua" id="rua" placeholder="Rua">

            <input type="text" name="numero" id="numero" maxlength="4" placeholder="Numero do Local">

            <input type="text" name="cidade" id="cidade" maxlength="10" placeholder="Cidade">

            <select name="estado" id="estado">
                <option value="escolha" selected disabled>Escolha o seu Estado</option>
                <option value="AC">AC</option>
                <option value="AL">AL</option>
                <option value="BA">BA</option>
                <option value="CE">CE</option>
                <option value="ES">ES</option>
                <option value="GO">GO</option>
                <option value="MT">MT</option>
                <option value="MG">MG</option>
                <option value="PR">PR</option>
            </select>

            <input type="text" name="cep" id="cep" maxlength="8" placeholder="Cep">

            <button type="submit" onclick="return validarSenha()">Cadastrar</button>

        </form>
    </section>

    <footer>
        <div class="containerFooter">
            <div class="esquerdo">
                <h2 class="textoFooter">SALA+</h2>

                <div class="descricaoEsquerda">
                    <div class="eventoss">

                        <h2>Eventos</h2>
                        <a href="#">Agendamento</a>
                        <a href="#">Lista de Agendas</a>
                        <a href="#">Cadastro Clientes</a>
                    </div>

                    <div class="eventoss">
                        <h2>Planos</h2>
                        <a href="#">Pagamento</a>
                        <a href="#">Ver Planos</a>
                    </div>
                </div>
            </div>


            <div class="esquerda">
                <h2 class="textoFooter">APLICATIVOS</h2>

                <div class="descricaoEsquerda">
                    <div class="apps">
                        <div class="topos">
                            <a href="https://www.instagram.com/">
                                <img src="instagram.svg" alt="">
                            </a>

                            <a href="https://www.facebook.com/?locale=pt_BR">
                                <img src="facebook.svg" alt="">
                            </a>

                            <a href="https://web.whatsapp.com/">
                                <img src="whatsapp.svg" alt="">
                            </a>
                        </div>

                        <h4 id="arolba">@agendamento_sala+</h4>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="cliente.js"></script>
</body>

</html>
