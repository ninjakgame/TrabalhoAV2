<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
    <link rel="stylesheet" href="criar.css">
    <link rel="stylesheet" href="topo3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>
    <header>
        <div class="topo">
            <div class="conteudoTopo">
                <h2 class="logo"><a href="index.html">SALA+</a></h2>

                <div class="links">
                    <a href="sobre.html" class="login">SOBRE NOIS</a>
                    <a href="cadastroCliente.html" class="login">AGENDAR AGORA</a>
                    <a href="ajuda.html" class="login">AJUDA</a>
                </div>
            </div>
        </div>
    </header>

    <div class="cadastroConta">
        <div class="container">
            <h2>CRIAR CONTA</h2>

            <form action="form-cadastro.html">
                <label for="nome">Nome</label>
                <input type="text" name="nome" id="nome" required placeholder="Usuario123">

                <label for="email">Email</label>
                <input type="email" name="email" id="email" required placeholder="Exemplo@gmail.com">

                <label for="senha">Senha</label>
                <input type="password" name="senha" id="senha" required placeholder="Senha123">

                <label for="confirmarSenha">Confirmação da Senha</label>
                <input type="password" name="confirmarSenha" id="confirmarSenha" required placeholder="Senha123">

                <label for="agenda">Agenda</label>
                <select name="agenda" id="agenda" required>
                    <option value="escolha" selected disabled>Escolha seu Agendamento Aqui</option>
                    <option value="reuniao">Reunião</option>
                    <option value="aula">Aula</option>
                    <option value="evento">Evento</option>
                    <option value="outra">Outras Atividades</option>
                </select>

                <label for="dataAgendamento">Dia do Agendamento</label>
                <input type="date" name="dataAgendamento" id="dataAgendamento" required>

                <button type="submit" onclick="return validarSenha()">Criar</button>
            </form>
        </div>
    </div>

    <footer class="footer">
    <div class="footer-content">
        <h3>EVENTO+</h3>
        <p>Organizando eventos com facilidade e rapidez.</p>

        <div class="footer-links">
            <a href="#">Início</a>
            <a href="eventos.html">Agendar Evento</a>
            <a href="ajuda.html">Contato</a>
            <a href="sobre.html">Sobre</a>
        </div>

        <p class="footer-copy">© 2025 EVENTO+ - Todos os direitos reservados.</p>
    </div>
</footer>

    <script src="criar.js"></script>
</body>

</html>
