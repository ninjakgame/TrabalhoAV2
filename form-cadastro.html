<!DOCTYPE html>
<html lang="PT-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALA+</title>
    <link rel="shortcut icon" href="agendamento.png" type="image/x-icon">
    <link rel="stylesheet" href="stylePrincipal.css">
    <link rel="stylesheet" href="topo3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>
    <header>
        <div class="topo">
            <div class="conteudoTopo">
                <h2 class="logo"><a href="paginaInicial.html">SALA+</a></h2>

                <div class="links">
                    <a href="sobre.html" class="login">SOBRE NOIS</a>
                    <a href="cadastroCliente.html" class="login">AGENDAR AGORA</a>
                    <a href="ajuda.html" class="login">AJUDA</a>
                </div>
            </div>
        </div>
    </header>

    <div class="containerTabela">
      <h1>Tabela de Agendamentos</h1>
        <div class="butao">
            <button onclick="criar()">Criar</button>
            <button onclick="editarSelecionado()" id="editar">Editar</button>
        </div>


        <table border="1">
            <thead>
                <tr>
                    <th>BOX</th>
                    <th>ID</th>
                    <th>NOME</th>
                    <th>EMAIL</th>
                    <th>AGENDAMENTO</th>
                    <th>DATA</th>
                    <th>STATUS</th>
                    <th>EXCLUIR</th>
                </tr>
            </thead>

            <tbody id="tbody"></tbody>
        </table>

    </div>

    <div id="modal" class="modal">
        <div class="modal-conteudo">

            <div class="modal-header">
                <h2>Detalhes do Cliente</h2>
                <span class="fechar" onclick="fecharModal()">×</span>
            </div>

            <div class="modal-body">

                <div class="campo">
                    <label>Nome</label>
                    <span id="mNome"></span>
                </div>

                <div class="campo">
                    <label>Email</label>
                    <span id="mEmail"></span>
                </div>

                <div class="campo">
                    <label>Agendamento</label>
                    <span id="mAgenda"></span>
                </div>

                <div class="campo">
                    <label>Data</label>
                    <span id="mData"></span>
                </div>

                <div class="campo">
                    <label>Status</label>
                    <span id="mStatus" class="status"></span>
                </div>

            </div>

        </div>
    </div>

    <footer>
        <div class="containerFooter">
            <div class="esquerdo">
                <h2 class="textoFooter">SALA+</h2>

                <div class="descricaoEsquerda">
                    <div class="eventoss">

                        <h2>Eventos</h2>
                        <a href="#">Agendamento</a>
                        <a href="#">Lista de Agendas</a>
                        <a href="#">Cadastro Clientes</a>
                    </div>

                    <div class="eventoss">
                        <h2>Planos</h2>
                        <a href="#">Pagamento</a>
                        <a href="#">Ver Planos</a>
                    </div>
                </div>
            </div>


            <div class="esquerda">
                <h2 class="textoFooter">APLICATIVOS</h2>

                <div class="descricaoEsquerda">
                    <div class="apps">
                        <div class="topos">
                            <a href="https://www.instagram.com/">
                                <img src="instagram.svg" alt="">
                            </a>

                            <a href="https://www.facebook.com/?locale=pt_BR">
                                <img src="facebook.svg" alt="">
                            </a>

                            <a href="https://web.whatsapp.com/">
                                <img src="whatsapp.svg" alt="">
                            </a>
                        </div>

                        <h4 id="arolba">@agendamento_sala+</h4>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="script2.js"></script>
</body>

</html>
